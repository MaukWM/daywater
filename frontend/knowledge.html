<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daywater — Knowledge Base</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    /* ── Full-viewport overlay ────────────────────────────────────── */
    .kb-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg); display: flex; flex-direction: column; z-index: 10;
    }

    .kb-topbar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .kb-topbar .breadcrumb { flex: 1; }
    .kb-topbar h2 {
      margin: 0; font-size: 0.85rem; font-weight: 600;
      color: var(--green); letter-spacing: 0.04em;
    }

    /* ── Tabs ─────────────────────────────────────────────────────── */
    .kb-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      flex-shrink: 0; padding: 0 1rem;
    }
    .kb-tab {
      padding: 0.5rem 1rem; font-size: 0.78rem; cursor: pointer;
      color: var(--text-dim); border-bottom: 2px solid transparent;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: inherit; transition: color 0.15s;
    }
    .kb-tab:hover { color: var(--text); }
    .kb-tab.active {
      color: var(--green); border-bottom-color: var(--green); font-weight: 600;
    }

    /* ── Panels ───────────────────────────────────────────────────── */
    .kb-panel {
      flex: 1; display: none; overflow: hidden;
    }
    .kb-panel.active { display: flex; }

    /* ── Split pane (Research + Gecko) ─────────────────────────────── */
    .kb-split {
      display: flex; flex: 1; overflow: hidden;
    }
    .kb-sidebar {
      width: 220px; min-width: 220px; border-right: 1px solid var(--border);
      background: var(--surface); overflow-y: auto; flex-shrink: 0;
    }
    .kb-sidebar-header {
      padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 600;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    .kb-file-item {
      display: flex; flex-direction: column; gap: 0.15rem;
      padding: 0.5rem 1rem; font-size: 0.82rem;
      cursor: pointer; color: var(--text); border: none; border-bottom: 1px solid var(--border);
      background: none; width: 100%; text-align: left; font-family: inherit;
      transition: background 0.1s; user-select: none;
    }
    .kb-file-item:hover { background: var(--surface-hover); color: var(--green); }
    .kb-file-item.active {
      background: rgba(0, 255, 159, 0.06); color: var(--green);
      border-left: 2px solid var(--green);
    }

    .kb-content {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }
    .kb-content-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-dim); font-size: 0.8rem;
      font-style: italic;
    }

    /* ── Document display ─────────────────────────────────────────── */
    .kb-doc-name {
      font-size: 0.72rem; font-weight: 600; color: var(--green-dim);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    .kb-doc-body {
      font-size: 0.8rem; line-height: 1.6; white-space: pre-wrap;
      color: var(--text); font-family: inherit;
    }
    .kb-doc-body.mono {
      font-family: monospace; font-size: 0.75rem; line-height: 1.5;
    }
    .kb-doc-desc {
      font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.75rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }

    /* ── File list meta ───────────────────────────────────────────── */
    .kb-file-meta {
      font-size: 0.62rem; color: var(--text-dim); margin-top: 0.1rem;
      overflow: hidden; text-overflow: ellipsis;
    }
    .kb-file-delete {
      float: right; font-size: 0.6rem; color: var(--red, #f44);
      cursor: pointer; opacity: 0; transition: opacity 0.15s;
      background: none; border: none; font-family: inherit; padding: 0;
    }
    .kb-file-item:hover .kb-file-delete { opacity: 1; }

    /* ── Annotations panel ────────────────────────────────────────── */
    .kb-annotations {
      flex: 1; overflow-y: auto; padding: 1rem;
    }

    .kb-section { margin-bottom: 1.5rem; }

    .section-header {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;
    }
    .kb-heading {
      font-size: 0.72rem; font-weight: 600; color: var(--green-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .kb-table {
      width: 100%; border-collapse: collapse; font-size: 0.78rem;
    }
    .kb-table th {
      text-align: left; padding: 0.3rem 0.5rem; font-size: 0.68rem;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border); font-weight: 600;
    }
    .kb-table td {
      padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .kb-table tr:hover td { background: var(--surface); }
    .kb-th-detail { width: 40%; }

    /* ── Kind badges ──────────────────────────────────────────────── */
    .kb-kind {
      display: inline-block; font-size: 0.62rem; padding: 0.1rem 0.35rem;
      border-radius: 3px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .kb-kind-addr { background: rgba(100,180,255,0.15); color: #6ab4ff; }
    .kb-kind-func { background: rgba(120,220,120,0.15); color: #78dc78; }
    .kb-kind-note { background: rgba(220,180,80,0.15); color: #dcb450; }

    .kb-addr {
      font-family: monospace; font-size: 0.75rem; color: var(--text);
    }
    .kb-name {
      font-weight: 600; color: var(--text);
    }
    .kb-detail {
      color: var(--text-dim); font-size: 0.75rem;
    }
    .kb-dim { color: var(--text-dim); }

    .empty-state {
      color: var(--text-dim); font-size: 0.8rem; font-style: italic;
      padding: 1rem 0.5rem;
    }

    /* ── Delete button in tables ──────────────────────────────────── */
    .kb-row-delete {
      font-size: 0.62rem; color: var(--red, #f44); cursor: pointer;
      background: none; border: none; font-family: inherit; padding: 0.1rem 0.3rem;
      opacity: 0.6; transition: opacity 0.15s;
    }
    .kb-row-delete:hover { opacity: 1; }

    /* ── Reset button ─────────────────────────────────────────────── */
    .kb-reset-btn {
      font-size: 0.68rem; padding: 0.25rem 0.6rem;
      color: var(--red, #f44); border: 1px solid var(--red, #f44);
      background: transparent; cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .kb-reset-btn:hover { background: rgba(255,68,68,0.1); }
  </style>
</head>
<body>

  <div class="kb-overlay">
    <!-- Top bar: breadcrumb only -->
    <div class="kb-topbar">
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>

    <!-- Tabs + Reset All on same row -->
    <div class="kb-tabs" style="display:flex; align-items:center;">
      <button class="kb-tab active" data-tab="research">Research</button>
      <button class="kb-tab" data-tab="gecko">Gecko Codes</button>
      <button class="kb-tab" data-tab="annotations">Annotations</button>
      <span style="flex:1;"></span>
      <button class="kb-reset-btn" id="reset-all-btn" style="margin-right:0.5rem;">Reset All</button>
    </div>

    <!-- Panel: Research -->
    <div class="kb-panel active" id="panel-research">
      <div class="kb-split">
        <div class="kb-sidebar" id="research-list"></div>
        <div class="kb-content" id="research-content">
          <div class="kb-content-empty">Select a document to view its contents.</div>
        </div>
      </div>
    </div>

    <!-- Panel: Gecko Codes -->
    <div class="kb-panel" id="panel-gecko">
      <div class="kb-split">
        <div class="kb-sidebar" id="gecko-list"></div>
        <div class="kb-content" id="gecko-content">
          <div class="kb-content-empty">Select a gecko code to view its contents.</div>
        </div>
      </div>
    </div>

    <!-- Panel: Annotations -->
    <div class="kb-panel" id="panel-annotations">
      <div class="kb-annotations" id="annotations-content"></div>
    </div>
  </div>

  <script type="module">
    import { api, param } from './shared/api.js';
    import { renderLayout, breadcrumb } from './shared/layout.js';

    renderLayout();

    const projectId = param('id');
    if (!projectId) { window.location.href = '/index.html'; }

    // ── Breadcrumb (updated after project loads) ──────────────────── //

    const bcEl = document.getElementById('breadcrumb');
    breadcrumb(bcEl, [
      { text: 'Projects', href: '/index.html' },
      { text: '...', href: `/project.html?id=${projectId}` },
      { text: 'Knowledge' },
    ]);

    // Fetch project name for breadcrumb
    api('GET', `/api/projects/${projectId}`).then(p => {
      const name = p.name || p.game_id || projectId.slice(0, 8);
      breadcrumb(bcEl, [
        { text: 'Projects', href: '/index.html' },
        { text: name, href: `/project.html?id=${projectId}` },
        { text: 'Knowledge' },
      ]);
    }).catch(() => {});

    // ── Tabs ────────────────────────────────────────────────────────── //

    const tabs = document.querySelectorAll('.kb-tab');
    const panels = document.querySelectorAll('.kb-panel');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ── Reset All ───────────────────────────────────────────────────── //

    document.getElementById('reset-all-btn').addEventListener('click', async () => {
      if (!confirm('Delete ALL knowledge (research docs, gecko codes, findings, renames, notes) for this project?')) return;
      try {
        await api('DELETE', `/api/projects/${projectId}/knowledge`);
        loadResearch();
        loadGeckoCodes();
        loadAnnotations();
      } catch (e) {
        alert('Reset failed: ' + e.message);
      }
    });

    // ── Research tab ────────────────────────────────────────────────── //

    let researchDocs = [];
    let researchIndex = '';

    async function loadResearch() {
      const listEl = document.getElementById('research-list');
      const contentEl = document.getElementById('research-content');
      contentEl.innerHTML = '<div class="kb-content-empty">Select a document to view its contents.</div>';

      try {
        const res = await api('GET', `/api/projects/${projectId}/research`);
        researchDocs = res.docs || [];
        researchIndex = res.index || '';
      } catch {
        researchDocs = [];
        researchIndex = '';
      }

      const header = '<div class="kb-sidebar-header">Documents</div>';

      if (!researchDocs.length) {
        listEl.innerHTML = header + '<div style="padding:0.75rem 1rem; color:var(--text-dim); font-size:0.8rem;">No research documents.</div>';
        return;
      }

      // INDEX entry
      const indexEntry = `<div class="kb-file-item" data-filename="__INDEX__">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <span style="font-weight:600;">INDEX</span>
        </div>
      </div>`;

      const docEntries = researchDocs.map(d => {
        const summary = d.summary || '';
        return `<div class="kb-file-item" data-filename="${esc(d.filename)}">
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(d.filename)}</span>
            <button class="kb-file-delete" data-filename="${esc(d.filename)}" title="Delete">x</button>
          </div>
          ${summary ? `<span style="font-size:0.72rem; color:var(--text-dim); line-height:1.3; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${esc(summary)}</span>` : ''}
        </div>`;
      }).join('');

      listEl.innerHTML = header + indexEntry + docEntries;

      // Click handlers
      listEl.querySelectorAll('.kb-file-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('kb-file-delete')) return;
          listEl.querySelectorAll('.kb-file-item').forEach(x => x.classList.remove('active'));
          el.classList.add('active');
          const fn = el.dataset.filename;
          if (fn === '__INDEX__') {
            showResearchIndex();
          } else {
            showResearchDoc(fn);
          }
        });
      });

      // Delete handlers
      listEl.querySelectorAll('.kb-file-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const fn = btn.dataset.filename;
          if (!confirm(`Delete research doc "${fn}"?`)) return;
          try {
            await api('DELETE', `/api/projects/${projectId}/research/${encodeURIComponent(fn)}`);
            loadResearch();
          } catch (err) {
            alert('Delete failed: ' + err.message);
          }
        });
      });

      // Show index by default
      const firstItem = listEl.querySelector('.kb-file-item');
      if (firstItem) firstItem.classList.add('active');
      showResearchIndex();
    }

    function showResearchIndex() {
      const contentEl = document.getElementById('research-content');
      contentEl.innerHTML = `
        <div style="padding:0.6rem 1.5rem; border-bottom:1px solid var(--border); background:var(--surface);">
          <span class="kb-doc-name">INDEX (auto-generated)</span>
        </div>
        <div id="research-doc-text" style="flex:1; padding:1.2rem 2rem; font-size:0.82rem; color:var(--text); overflow-y:auto; white-space:pre-wrap; word-wrap:break-word; line-height:1.7; background:var(--bg); font-family:inherit;"></div>
      `;
      document.getElementById('research-doc-text').textContent = researchIndex || 'No documents.';
    }

    async function showResearchDoc(filename) {
      const contentEl = document.getElementById('research-content');
      contentEl.innerHTML = '<div class="kb-content-empty">Loading...</div>';
      try {
        const doc = await api('GET', `/api/projects/${projectId}/research/${encodeURIComponent(filename)}`);
        const text = typeof doc === 'string' ? doc : (doc.content || doc.text || JSON.stringify(doc, null, 2));
        contentEl.innerHTML = `
          <div style="padding:0.6rem 1.5rem; border-bottom:1px solid var(--border); background:var(--surface);">
            <span class="kb-doc-name">${esc(filename)}</span>
          </div>
          <div id="research-doc-text" style="flex:1; padding:1.2rem 2rem; font-size:0.82rem; color:var(--text); overflow-y:auto; white-space:pre-wrap; word-wrap:break-word; line-height:1.7; background:var(--bg); font-family:inherit;"></div>
        `;
        document.getElementById('research-doc-text').textContent = text;
      } catch (e) {
        contentEl.innerHTML = `<div class="kb-content-empty" style="color:var(--red);">Failed to load: ${esc(e.message)}</div>`;
      }
    }

    // ── Gecko Codes tab ─────────────────────────────────────────────── //

    async function loadGeckoCodes() {
      const listEl = document.getElementById('gecko-list');
      const contentEl = document.getElementById('gecko-content');
      contentEl.innerHTML = '<div class="kb-content-empty">Select a gecko code to view its contents.</div>';

      let codes = [];
      try {
        const res = await api('GET', `/api/projects/${projectId}/gecko-codes`);
        codes = res.codes || [];
      } catch {
        codes = [];
      }

      const header = '<div class="kb-sidebar-header">Saved Codes</div>';

      if (!codes.length) {
        listEl.innerHTML = header + '<div style="padding:0.75rem 1rem; color:var(--text-dim); font-size:0.8rem;">No saved Gecko codes yet.</div>';
        return;
      }

      listEl.innerHTML = header + codes.map(gc => {
        const name = gc.name || gc.filename || 'Untitled';
        const desc = gc.description ? gc.description.substring(0, 60) + (gc.description.length > 60 ? '...' : '') : '';
        const task = gc.task_id ? `task ${gc.task_id.substring(0, 8)}` : '';
        return `<div class="kb-file-item" data-filename="${esc(gc.filename || gc.name)}">
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <span style="font-weight:600;">$${esc(name)}</span>
            <button class="kb-file-delete" data-filename="${esc(gc.filename || gc.name)}" title="Delete">x</button>
          </div>
          <span style="font-size:0.72rem; color:var(--text-dim); line-height:1.3;">${gc.lines} lines${desc ? ' — ' + esc(desc) : ''}</span>
          ${task ? `<span style="font-size:0.68rem; color:var(--text-dim);">${task}</span>` : ''}
        </div>`;
      }).join('');

      listEl.querySelectorAll('.kb-file-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('kb-file-delete')) return;
          listEl.querySelectorAll('.kb-file-item').forEach(x => x.classList.remove('active'));
          el.classList.add('active');
          showGeckoCode(el.dataset.filename);
        });
      });

      listEl.querySelectorAll('.kb-file-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const fn = btn.dataset.filename;
          if (!confirm(`Delete gecko code "${fn}"?`)) return;
          try {
            await api('DELETE', `/api/projects/${projectId}/gecko-codes/${encodeURIComponent(fn)}`);
            loadGeckoCodes();
          } catch (err) {
            alert('Delete failed: ' + err.message);
          }
        });
      });
    }

    async function showGeckoCode(filename) {
      const contentEl = document.getElementById('gecko-content');
      contentEl.innerHTML = '<div class="kb-content-empty">Loading...</div>';
      try {
        const gc = await api('GET', `/api/projects/${projectId}/gecko-codes/${encodeURIComponent(filename)}`);
        const content = gc.content || gc.text || '';
        contentEl.innerHTML = `
          <div style="padding:0.6rem 1.5rem; border-bottom:1px solid var(--border); background:var(--surface);">
            <span class="kb-doc-name">${esc(gc.name || filename)}</span>
          </div>
          ${gc.description ? `<div style="padding:0.8rem 1.5rem; font-size:0.82rem; color:var(--text); border-bottom:1px solid var(--border); background:var(--surface); line-height:1.6;" id="gcc-desc"></div>` : ''}
          <div id="gcc-code" style="flex:1; padding:1.2rem 2rem; font-size:0.82rem; color:var(--green); overflow-y:auto; white-space:pre; line-height:1.7; background:var(--bg); font-family:'Fira Code',monospace;"></div>
        `;
        if (gc.description) document.getElementById('gcc-desc').textContent = gc.description;
        document.getElementById('gcc-code').textContent = content;
      } catch (e) {
        contentEl.innerHTML = `<div class="kb-content-empty" style="color:var(--red);">Failed to load: ${esc(e.message)}</div>`;
      }
    }

    // ── Annotations tab ─────────────────────────────────────────────── //

    async function loadAnnotations() {
      const container = document.getElementById('annotations-content');
      container.innerHTML = '<div class="kb-content-empty">Loading...</div>';

      let knowledge;
      try {
        knowledge = await api('GET', `/api/projects/${projectId}/knowledge`);
      } catch (e) {
        container.innerHTML = `<div class="kb-content-empty" style="color:var(--red);">Failed to load: ${esc(e.message)}</div>`;
        return;
      }

      const findings = knowledge.findings || [];
      const renames = knowledge.function_renames || knowledge.renames || [];
      const notes = knowledge.notes || [];

      let html = '';

      // ── Findings ──
      html += `<div class="kb-section">
        <div class="section-header"><span class="kb-heading">Findings</span></div>`;
      if (findings.length) {
        html += `<table class="kb-table">
          <tr>
            <th>Kind</th><th>Address</th><th>Label</th><th class="kb-th-detail">Detail</th><th></th>
          </tr>`;
        for (const f of findings) {
          const kind = f.kind || 'note';
          const kindClass = kind === 'address' || kind === 'addr' ? 'kb-kind-addr'
            : kind === 'function' || kind === 'func' ? 'kb-kind-func'
            : 'kb-kind-note';
          html += `<tr>
            <td><span class="kb-kind ${kindClass}">${esc(kind)}</span></td>
            <td class="kb-addr">${esc(f.address || '-')}</td>
            <td class="kb-name">${esc(f.label || f.name || '-')}</td>
            <td class="kb-detail">${esc(f.detail || f.description || '-')}</td>
            <td><button class="kb-row-delete" data-finding-id="${f.id}" title="Delete">x</button></td>
          </tr>`;
        }
        html += '</table>';
      } else {
        html += '<div class="empty-state">No findings yet.</div>';
      }
      html += '</div>';

      // ── Function Renames ──
      html += `<div class="kb-section">
        <div class="section-header"><span class="kb-heading">Function Renames</span></div>`;
      if (renames.length) {
        html += `<table class="kb-table">
          <tr><th>Address</th><th>Name</th><th>Binary</th></tr>`;
        for (const r of renames) {
          html += `<tr>
            <td class="kb-addr">0x${esc(r.address || '')}</td>
            <td class="kb-name">${esc(r.name || '')}</td>
            <td class="kb-dim">${esc(r.binary || '')}</td>
          </tr>`;
        }
        html += '</table>';
      } else {
        html += '<div class="empty-state">No function renames.</div>';
      }
      html += '</div>';

      // ── Notes ──
      html += `<div class="kb-section">
        <div class="section-header"><span class="kb-heading">Notes</span></div>`;
      if (notes.length) {
        html += `<table class="kb-table">
          <tr><th>Address</th><th class="kb-th-detail">Note</th><th>Binary</th></tr>`;
        for (const n of notes) {
          html += `<tr>
            <td class="kb-addr">0x${esc(n.address || '')}</td>
            <td class="kb-detail">${esc(n.text || '')}</td>
            <td class="kb-dim">${esc(n.binary || '')}</td>
          </tr>`;
        }
        html += '</table>';
      } else {
        html += '<div class="empty-state">No notes.</div>';
      }
      html += '</div>';

      container.innerHTML = html;

      // Wire up finding delete buttons
      container.querySelectorAll('.kb-row-delete[data-finding-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const fid = btn.dataset.findingId;
          if (!confirm('Delete this finding?')) return;
          try {
            await api('DELETE', `/api/projects/${projectId}/findings/${fid}`);
            loadAnnotations();
          } catch (e) {
            alert('Delete failed: ' + e.message);
          }
        });
      });
    }

    // ── Helpers ──────────────────────────────────────────────────────── //

    function esc(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    // ── Init ────────────────────────────────────────────────────────── //

    loadResearch();
    loadGeckoCodes();
    loadAnnotations();
  </script>
</body>
</html>
