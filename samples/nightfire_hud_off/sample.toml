# Spectre sample: 007: Nightfire NTSC, HUD-removal task.
#
# Paths to licensed binaries (ROM, savestate) are read from env vars at
# runtime, not committed. Everything else (hint, reference frame, mask)
# lives next to this file.

id = "nightfire_hud_off"
game_id = "GO7E69"                # 6-byte GameCube disc ID, must match ISO
description = "Disable the health and ammo HUD elements in 007: Nightfire NTSC."

# Environment variables resolved at task load time.
iso_env = "SPECTRE_NIGHTFIRE_ISO"
savestate_env = "SPECTRE_NIGHTFIRE_SAV"

# Optional: pre-merged ELF from a decomp project. When set, Ghidra
# analyzes this instead of the DOL extracted from the ISO. Strongly
# preferred — covers REL-loaded modules and the full address space.
binary_env = "SPECTRE_NIGHTFIRE_ELF"

# Dolphin run config.
run_seconds = 10

# Agent budget — max tool calls per solve.
verify_budget = 8

# Scorer thresholds (mean per-channel absolute pixel diff).
score_hud_min_mean = 5.0          # HUD region must change by at least this
score_preserve_max_mean = 6.0     # Non-HUD region must change by at most this
                                  # (run-to-run drift across particles/anim
                                  # in the full preserve area is ~5; tighten
                                  # later via same-run reference capture)
